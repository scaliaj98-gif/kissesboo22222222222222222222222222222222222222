<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapRecord - Screenshot Editor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0F172A; color:white; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    
    /* TOOLBAR */
    .toolbar {
      height:56px; background:#1E293B; border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center; padding:0 16px; gap:8px;
      overflow-x:auto; flex-shrink:0;
    }
    .toolbar::-webkit-scrollbar { height:0; }
    .tool-group { display:flex; gap:4px; padding:0 8px; border-right:1px solid rgba(255,255,255,0.08); }
    .tool-group:last-child { border-right:none; }
    .tool-btn {
      width:36px; height:36px; border:none; background:transparent;
      border-radius:8px; cursor:pointer; color:rgba(255,255,255,0.6);
      display:flex; align-items:center; justify-content:center;
      font-size:16px; transition:all 0.15s;
      position:relative;
    }
    .tool-btn:hover { background:rgba(255,255,255,0.1); color:white; }
    .tool-btn.active { background:rgba(255,107,107,0.2); color:#FF6B6B; }
    .tool-btn[title]:hover::after {
      content:attr(title); position:absolute; bottom:-30px; left:50%; transform:translateX(-50%);
      background:#0F172A; color:white; font-size:11px; padding:3px 8px;
      border-radius:6px; white-space:nowrap; z-index:100;
      border:1px solid rgba(255,255,255,0.1);
    }
    .color-picker { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); cursor:pointer; }
    .size-input {
      width:50px; padding:4px 6px; background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1); border-radius:6px;
      color:white; font-size:12px; text-align:center; outline:none;
    }
    .toolbar-title { font-size:14px; font-weight:700; color:white; margin-right:auto; }
    .action-btn {
      padding:8px 16px; border:none; border-radius:10px;
      cursor:pointer; font-size:13px; font-weight:700;
      font-family:'Inter',sans-serif; display:flex; align-items:center; gap:6px;
    }
    .btn-secondary { background:rgba(255,255,255,0.08); color:white; }
    .btn-primary { background:linear-gradient(135deg,#FF6B6B,#FF8E53); color:white; box-shadow:0 4px 12px rgba(255,107,107,0.4); }
    .btn-purple { background:linear-gradient(135deg,#6366F1,#8B5CF6); color:white; }
    
    /* CANVAS AREA */
    .canvas-container {
      flex:1; position:relative; overflow:auto; background:#0B1120;
      display:flex; align-items:center; justify-content:center;
    }
    .canvas-wrapper { position:relative; display:inline-block; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
    #screenshot-canvas { display:block; }
    #annotation-canvas {
      position:absolute; top:0; left:0;
      cursor:crosshair;
    }

    /* STATUS BAR */
    .status-bar {
      height:32px; background:#1E293B; border-top:1px solid rgba(255,255,255,0.06);
      display:flex; align-items:center; padding:0 16px; gap:16px; flex-shrink:0;
    }
    .status-item { font-size:12px; color:rgba(255,255,255,0.4); display:flex; align-items:center; gap:4px; }

    /* SHAPE OVERLAY */
    .overlay-controls {
      position:fixed; top:0; right:0; bottom:0;
      width:220px; background:#1E293B; border-left:1px solid rgba(255,255,255,0.08);
      padding:16px; transform:translateX(100%); transition:transform 0.3s; z-index:50;
      display:none;
    }
    .overlay-controls.show { display:block; transform:translateX(0); }
    .overlay-title { font-size:13px; font-weight:700; margin-bottom:12px; }
    .control-row { margin-bottom:12px; }
    .control-label { font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:4px; }
    .control-slider { width:100%; accent-color:#FF6B6B; }
    .control-select {
      width:100%; padding:6px 10px; background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1); border-radius:8px;
      color:white; font-size:12px; outline:none;
    }

    /* SHARE MODAL */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.8); z-index:200;
      align-items:center; justify-content:center;
      backdrop-filter:blur(8px);
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:#1E293B; border-radius:20px; padding:28px;
      width:400px; border:1px solid rgba(255,255,255,0.1);
      box-shadow:0 40px 80px rgba(0,0,0,0.5);
    }
    .modal-title { font-size:18px; font-weight:800; margin-bottom:6px; }
    .modal-desc { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:20px; }
    .modal-input {
      width:100%; padding:10px 14px; background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      color:white; font-size:14px; outline:none; margin-bottom:12px;
      font-family:'Inter',sans-serif;
    }
    .modal-input:focus { border-color:rgba(255,107,107,0.5); }
    .share-link-box {
      display:flex; gap:8px; margin-top:16px;
      padding:12px; background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
    }
    .share-link-text { flex:1; font-size:12px; color:#6366F1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .copy-btn {
      padding:4px 12px; background:#6366F1; color:white;
      border:none; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700;
    }
  </style>
</head>
<body>
  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-title">📸 Screenshot Editor</div>
    
    <div class="tool-group">
      <button class="tool-btn active" id="tool-select" title="Select/Move">😎</button>
      <button class="tool-btn" id="tool-pen" title="Pen/Draw">✏️</button>
      <button class="tool-btn" id="tool-highlighter" title="Highlighter">🟡</button>
    </div>
    
    <div class="tool-group">
      <button class="tool-btn" id="tool-rect" title="Rectangle">◻️</button>
      <button class="tool-btn" id="tool-circle" title="Circle">○</button>
      <button class="tool-btn" id="tool-arrow" title="Arrow">→</button>
      <button class="tool-btn" id="tool-line" title="Line">—</button>
    </div>
    
    <div class="tool-group">
      <button class="tool-btn" id="tool-text" title="Add Text">📝</button>
      <button class="tool-btn" id="tool-blur" title="Blur/Redact">🖌️</button>
      <button class="tool-btn" id="tool-crop" title="Crop">✂️</button>
      <button class="tool-btn" id="tool-emoji" title="Add Emoji">😀</button>
    </div>
    
    <div class="tool-group">
      <input type="color" class="color-picker" id="color-picker" value="#FF6B6B" title="Color">
      <input type="number" class="size-input" id="size-input" value="3" min="1" max="50" title="Size">
    </div>
    
    <div class="tool-group">
      <button class="tool-btn" id="undo-btn" title="Undo">↩</button>
      <button class="tool-btn" id="redo-btn" title="Redo">↪</button>
      <button class="tool-btn" id="clear-btn" title="Clear Annotations">🗑️</button>
    </div>
    
    <div class="tool-group">
      <button class="action-btn btn-secondary" id="copy-btn">📋 Copy</button>
      <button class="action-btn btn-purple" id="share-btn">🔗 Share</button>
      <button class="action-btn btn-primary" id="download-btn">⬇️ Download</button>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-container" id="canvas-container">
    <div class="canvas-wrapper">
      <canvas id="screenshot-canvas"></canvas>
      <canvas id="annotation-canvas"></canvas>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-item" id="status-dimensions">📌 1920 × 1080</div>
    <div class="status-item" id="status-zoom">🔍 100%</div>
    <div class="status-item" id="status-tool">🔍 Select</div>
    <div class="status-item" style="margin-left:auto;">⌨️ Space+drag to pan • Scroll to zoom</div>
  </div>

  <!-- SHARE MODAL -->
  <div class="modal-overlay" id="share-modal">
    <div class="modal">
      <div class="modal-title">🔗 Share Screenshot</div>
      <div class="modal-desc">Upload and get a shareable link</div>
      <input class="modal-input" id="share-title" placeholder="Title (optional)" />
      <select class="modal-input" id="share-privacy">
        <option value="private">🔒 Private (only you)</option>
        <option value="public">🌎 Public (anyone with link)</option>
      </select>
      <input class="modal-input" id="share-expiry" type="date" placeholder="Expiration date (optional)" />
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="action-btn btn-secondary" style="flex:1" id="cancel-share">❌ Cancel</button>
        <button class="action-btn btn-primary" style="flex:1" id="confirm-share">🚀 Upload & Share</button>
      </div>
      <div class="share-link-box" id="share-link-box" style="display:none;">
        <span class="share-link-text" id="share-link-text"></span>
        <button class="copy-btn" id="copy-share-link">📋 Copy</button>
      </div>
    </div>
  </div>

  <script src="../js/screenshot.js"></script>
</body>
</html>
